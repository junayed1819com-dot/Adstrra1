<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adsterra 6-Slot Multi-Ad System</title>
    <style>
        /* পুরো পেজের স্টাইল */
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* ৬টি অ্যাড স্লটের গ্রিড ডিজাইন */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* ৩টি কলাম */
            grid-template-rows: repeat(2, 1fr);    /* ২ টি সারি */
            height: 100vh;
            width: 100vw;
            gap: 5px;
            background-color: #222;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }

        /* টাইমার ওভারলে */
        #timer-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 16px;
            border: 1px solid #00ff00;
            z-index: 10000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        /* ডেভেলপার কন্টাক্ট বাটন */
        .dev-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(45deg, #0088cc, #00c2ff);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.5);
            transition: transform 0.3s;
            display: flex;
            align-items: center;
        }

        .dev-button:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, #00c2ff, #0088cc);
        }

        /* মোবাইলের জন্য রেসপন্সিভ */
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
            }
            .dev-button {
                padding: 8px 15px;
                font-size: 12px;
            }
            #timer-box {
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div id="timer-box">Refreshing in: <span id="seconds">30</span>s</div>

    <a href="https://t.me/rifat_developer" target="_blank" class="dev-button">
        Developer Contact
    </a>

    <script src="https://planetsrecipe.com/f5/2e/60/f52e603c68e6e01cac72d54c5068a32b.js"></script>

    <div class="grid-container">
        <iframe src="https://www.effectivegatecpm.com/hj99iw71mj?key=b09b829801f8c23659f1cb7fa52884eb"></iframe>
        
        <iframe src="https://www.effectivegatecpm.com/e5fa9sweyb?key=e1832a9bf501f9d70defa0c0ef432285"></iframe>
        
        <iframe src="https://planetsrecipe.com/xdfvznnb?key=9d45cb334e98338c603288a4b7a3b4f7"></iframe>
        
        <iframe src="https://www.effectivegatecpm.com/hj99iw71mj?key=b09b829801f8c23659f1cb7fa52884eb"></iframe>
        
        <iframe src="https://www.effectivegatecpm.com/e5fa9sweyb?key=e1832a9bf501f9d70defa0c0ef432285"></iframe>
        
        <iframe src="https://planetsrecipe.com/xdfvznnb?key=9d45cb334e98338c603288a4b7a3b4f7"></iframe>
    </div>

    <script>
        let timeLeft = 30;
        const secondsSpan = document.getElementById('seconds');

        const countdown = setInterval(() => {
            timeLeft--;
            secondsSpan.innerText = timeLeft;

            if (timeLeft <= 0) {
                location.reload();
            }
        }, 1000);
    </script>

</body>
</html>
